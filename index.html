<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store - Responsive Shopping (INR)</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h1><i class="fas fa-store"></i> ShopHub</h1>
                </div>
                <nav class="nav">
                    <ul>
                        <li><a href="#home" class="nav-link active">Home</a></li>
                        <li><a href="#products" class="nav-link">Products</a></li>
                        <li><a href="#cart" class="nav-link">
                            <i class="fas fa-shopping-cart"></i>
                            Cart <span class="cart-count" id="cartCount">0</span>
                        </a></li>
                        <li><a href="#" class="nav-link" id="loginLink">Login</a></li>
                        <li><a href="admin/login.html" class="nav-link" id="adminLink">Admin</a></li>
                        <li><a href="#" class="nav-link" id="userLink" style="display: none;">
                            <i class="fas fa-user"></i> <span id="usernameDisplay"></span>
                        </a></li>
                    </ul>
                </nav>
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="container">
            <div class="hero-content">
                <h2>Welcome to ShopHub</h2>
                <p>Discover amazing products at great prices</p>
                <a href="#products" class="btn btn-primary">Shop Now</a>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Category Filter -->
            <section class="category-filter">
                <h3>Shop by Category</h3>
                <div class="category-buttons" id="categoryButtons">
                    <button class="category-btn active" data-category="all">All Products</button>
                </div>
            </section>

            <!-- Products Grid -->
            <section class="products-section" id="products">
                <h2>Our Products</h2>
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here dynamically -->
                </div>
                <div class="loading" id="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading products...
                </div>
            </section>

            <!-- Cart Section -->
            <section class="cart-section" id="cart" style="display: none;">
                <h2>Shopping Cart</h2>
                <div class="cart-container">
                    <div class="cart-items" id="cartItems">
                        <!-- Cart items will be loaded here -->
                    </div>
                    <div class="cart-summary">
                        <div class="cart-total">
                            <h3>Total: ₹<span id="cartTotal">0.00</span></h3>
                        </div>
                        <div class="cart-actions">
                            <button class="btn btn-secondary" id="clearCartBtn">Clear Cart</button>
                            <button class="btn btn-primary" id="checkoutBtn">Checkout</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 ShopHub. All rights reserved.</p>
                <div class="social-links">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <div class="toast-content">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage">Item added to cart!</span>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check authentication status
        document.addEventListener('DOMContentLoaded', () => {
            const userSession = localStorage.getItem('user_session') || sessionStorage.getItem('user_session');
            const loginLink = document.getElementById('loginLink');
            const userLink = document.getElementById('userLink');
            const usernameDisplay = document.getElementById('usernameDisplay');
            
            if (userSession) {
                try {
                    const user = JSON.parse(userSession);
                    loginLink.style.display = 'none';
                    userLink.style.display = 'block';
                    usernameDisplay.textContent = user.username;
                    
                    // Add logout functionality
                    userLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        if (confirm('Are you sure you want to logout?')) {
                            logout();
                        }
                    });
                } catch (error) {
                    console.error('Invalid session data:', error);
                }
            } else {
                loginLink.style.display = 'block';
                userLink.style.display = 'none';
                
                // Add login redirect
                loginLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = 'login.html';
                });
            }
        });
    </script>
</body>
</html>
